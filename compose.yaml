# ==============================================================================
# Carrot2 Docker Compose Configuration
# ==============================================================================
# This configuration deploys Carrot2 with Cloudflare Tunnel integration.
# All configuration values are centralized below for easy management.
# Override any value via environment variables or a .env file.
# ==============================================================================

# ------------------------------------------------------------------------------
# Configuration Variables (YAML Anchors)
# ------------------------------------------------------------------------------
# Carrot2 application settings - define once, reference everywhere
x-carrot2-version: &carrot2-version "4.8.6"
x-carrot2-variant: &carrot2-variant "cjk"
x-carrot2-checksum: &carrot2-checksum "6422480da201d7c8615709f28dbfd7e30bc1b98297e71be7b5aac366f157d840"
x-carrot2-image-tag: &carrot2-image-tag "carrot2:4.8.6-cjk"

# ------------------------------------------------------------------------------
# Services
# ------------------------------------------------------------------------------
services:
  # --------------------------------------------------------------------------
  # Carrot2 Search Results Clustering Engine
  # --------------------------------------------------------------------------
  carrot2:
    build:
      context: .
      args:
        CARROT2_VERSION: *carrot2-version
        CARROT2_VARIANT: *carrot2-variant
        CARROT2_CJK_CHECKSUM_SHA256: *carrot2-checksum
      tags:
        - *carrot2-image-tag
    image: *carrot2-image-tag
    restart: unless-stopped

    # Persistent storage for Carrot2 data
    volumes:
      - carrot2-data:/opt/carrot2/data

    # Port exposure (internal Docker network only)
    # Cloudflared accesses Carrot2 over the Docker network, not via host ports
    ports:
      - "8080"

    # JVM runtime configuration
    environment:
      JAVA_TOOL_OPTIONS: "-Xms512m -Xmx2g"

    # Health check configuration
    healthcheck:
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s

    networks:
      - carrot2-net

  # --------------------------------------------------------------------------
  # Cloudflare Tunnel - Securely exposes Carrot2 to the internet
  # --------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run

    # Tunnel authentication token (loaded from Docker secret)
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/tunnel_token

    secrets:
      - tunnel_token

    # Wait for Carrot2 to be healthy before starting
    depends_on:
      carrot2:
        condition: service_healthy

    networks:
      - carrot2-net

networks:
  carrot2-net:
    driver: bridge

volumes:
  carrot2-data:

# ------------------------------------------------------------------------------
# Secrets
# ------------------------------------------------------------------------------
secrets:
  # Cloudflare Tunnel authentication token
  # Create this file: echo "your-token" > .secrets/tunnel_token.txt
  tunnel_token:
    file: .secrets/tunnel_token.txt
